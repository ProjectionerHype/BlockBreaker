<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0050"/>
      <stop offset="100%" stop-color="#05001a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="40" r="1" fill="white" opacity="0.5"/>
  <circle cx="160" cy="130" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="20" cy="140" r="1" fill="white" opacity="0.5"/>
  <circle cx="90" cy="15" r="1" fill="white" opacity="0.3"/>
  <!-- Neon blocks row 1 -->
  <rect x="14" y="28" width="34" height="18" rx="4" fill="#001a3f" filter="url(#glow)"/>
  <rect x="14" y="28" width="34" height="18" rx="4" fill="none" stroke="#00f5ff" stroke-width="1.5"/>
  <rect x="54" y="28" width="34" height="18" rx="4" fill="#3f0030" filter="url(#glow)"/>
  <rect x="54" y="28" width="34" height="18" rx="4" fill="none" stroke="#ff00ff" stroke-width="1.5"/>
  <rect x="94" y="28" width="34" height="18" rx="4" fill="#1a3f00" filter="url(#glow)"/>
  <rect x="94" y="28" width="34" height="18" rx="4" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <rect x="134" y="28" width="34" height="18" rx="4" fill="#3f2e00" filter="url(#glow)"/>
  <rect x="134" y="28" width="34" height="18" rx="4" fill="none" stroke="#ffd700" stroke-width="1.5"/>
  <!-- Neon blocks row 2 -->
  <rect x="14" y="52" width="34" height="18" rx="4" fill="#3f1e00" filter="url(#glow)"/>
  <rect x="14" y="52" width="34" height="18" rx="4" fill="none" stroke="#ff8800" stroke-width="1.5"/>
  <rect x="54" y="52" width="34" height="18" rx="4" fill="#280033" filter="url(#glow)"/>
  <rect x="54" y="52" width="34" height="18" rx="4" fill="none" stroke="#cc44ff" stroke-width="1.5"/>
  <rect x="94" y="52" width="34" height="18" rx="4" fill="#3f0010" filter="url(#glow)"/>
  <rect x="94" y="52" width="34" height="18" rx="4" fill="none" stroke="#ff2244" stroke-width="1.5"/>
  <rect x="134" y="52" width="34" height="18" rx="4" fill="#001a3f" filter="url(#glow)"/>
  <rect x="134" y="52" width="34" height="18" rx="4" fill="none" stroke="#00f5ff" stroke-width="1.5"/>
  <!-- Ball trail -->
  <circle cx="95" cy="105" r="5" fill="#00f5ff" opacity="0.15"/>
  <circle cx="100" cy="100" r="4" fill="#00f5ff" opacity="0.3"/>
  <circle cx="106" cy="95" r="3" fill="#00f5ff" opacity="0.5"/>
  <!-- Ball -->
  <circle cx="112" cy="89" r="9" fill="#00f5ff" filter="url(#glow2)"/>
  <circle cx="112" cy="89" r="9" fill="none" stroke="white" stroke-width="1"/>
  <circle cx="109" cy="86" r="3" fill="white" opacity="0.6"/>
  <!-- Paddle -->
  <rect x="40" y="148" width="100" height="14" rx="7" fill="#003355"/>
  <rect x="40" y="148" width="100" height="14" rx="7" fill="none" stroke="#00f5ff" stroke-width="2" filter="url(#glow)"/>
  <rect x="45" y="151" width="90" height="4" rx="2" fill="#00f5ff" opacity="0.4"/>
</svg>
