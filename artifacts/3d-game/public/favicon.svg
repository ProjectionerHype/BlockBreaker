<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0050"/>
      <stop offset="100%" stop-color="#05001a"/>
    </radialGradient>
    <filter id="glow-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-ball" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="30" cy="22" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="155" cy="38" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="162" cy="130" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="18" cy="145" r="1" fill="white" opacity="0.7"/>
  <circle cx="88" cy="12" r="1" fill="white" opacity="0.5"/>
  <circle cx="140" cy="160" r="1.2" fill="white" opacity="0.5"/>

  <!-- Block row 1 — BRIGHT fills + glow -->
  <rect x="12" y="24" width="34" height="18" rx="4" fill="#00ccdd" filter="url(#glow-sm)"/>
  <rect x="12" y="24" width="34" height="18" rx="4" fill="#00f5ff" opacity="0.7"/>
  <rect x="12" y="24" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <rect x="52" y="24" width="34" height="18" rx="4" fill="#cc00cc" filter="url(#glow-sm)"/>
  <rect x="52" y="24" width="34" height="18" rx="4" fill="#ff00ff" opacity="0.7"/>
  <rect x="52" y="24" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <rect x="92" y="24" width="34" height="18" rx="4" fill="#00bb55" filter="url(#glow-sm)"/>
  <rect x="92" y="24" width="34" height="18" rx="4" fill="#00ff88" opacity="0.7"/>
  <rect x="92" y="24" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <rect x="132" y="24" width="36" height="18" rx="4" fill="#ccaa00" filter="url(#glow-sm)"/>
  <rect x="132" y="24" width="36" height="18" rx="4" fill="#ffd700" opacity="0.7"/>
  <rect x="132" y="24" width="36" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Block row 2 -->
  <rect x="12" y="48" width="34" height="18" rx="4" fill="#cc5500" filter="url(#glow-sm)"/>
  <rect x="12" y="48" width="34" height="18" rx="4" fill="#ff8800" opacity="0.7"/>
  <rect x="12" y="48" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <rect x="52" y="48" width="34" height="18" rx="4" fill="#8800cc" filter="url(#glow-sm)"/>
  <rect x="52" y="48" width="34" height="18" rx="4" fill="#cc44ff" opacity="0.7"/>
  <rect x="52" y="48" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <rect x="92" y="48" width="34" height="18" rx="4" fill="#cc0022" filter="url(#glow-sm)"/>
  <rect x="92" y="48" width="34" height="18" rx="4" fill="#ff2244" opacity="0.7"/>
  <rect x="92" y="48" width="34" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <rect x="132" y="48" width="36" height="18" rx="4" fill="#00ccdd" filter="url(#glow-sm)"/>
  <rect x="132" y="48" width="36" height="18" rx="4" fill="#00f5ff" opacity="0.7"/>
  <rect x="132" y="48" width="36" height="18" rx="4" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Ball trail (bright cyan dots) -->
  <circle cx="90" cy="112" r="5" fill="#00f5ff" opacity="0.2" filter="url(#glow-sm)"/>
  <circle cx="98" cy="105" r="4.5" fill="#00f5ff" opacity="0.4" filter="url(#glow-sm)"/>
  <circle cx="106" cy="97" r="4" fill="#00f5ff" opacity="0.65" filter="url(#glow-sm)"/>

  <!-- Ball — super bright with strong glow -->
  <circle cx="114" cy="89" r="11" fill="#00f5ff" filter="url(#glow-ball)"/>
  <circle cx="114" cy="89" r="11" fill="white" opacity="0.9"/>
  <circle cx="110" cy="85" r="4" fill="white" opacity="0.6"/>

  <!-- Paddle — vivid neon cyan -->
  <rect x="35" y="148" width="110" height="15" rx="7.5" fill="#0099cc" filter="url(#glow-lg)"/>
  <rect x="35" y="148" width="110" height="15" rx="7.5" fill="#00f5ff" opacity="0.85"/>
  <rect x="35" y="148" width="110" height="15" rx="7.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Paddle shine stripe -->
  <rect x="40" y="151" width="100" height="4" rx="2" fill="white" opacity="0.5"/>
</svg>
